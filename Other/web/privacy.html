<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - 5001 Words</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a6b3c 0%, #2d4a8a 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px; margin: 0 auto; padding: 40px;
        }
        .back-link { display: inline-block; color: #2d4a8a; text-decoration: none; font-size: 14px; margin-bottom: 20px; }
        .back-link:hover { text-decoration: underline; }
        .back-link::before { content: '← '; }
        h1 { color: #333; margin-bottom: 8px; font-size: 32px; }
        .updated { color: #999; font-size: 13px; margin-bottom: 24px; }
        h2 { color: #333; margin-top: 25px; margin-bottom: 10px; font-size: 20px; }
        p { color: #555; line-height: 1.7; margin-bottom: 12px; }
        a { color: #2d4a8a; }
        #content { display: none; }
        .loading { color: #666; padding: 20px 0; }
        @media (max-width: 600px) { .container { padding: 24px 16px; } h1 { font-size: 24px; } }
    </style>
</head>
<body>
<div class="container">
    <a href="/5001words/" id="backLink" class="back-link">5001 Words</a>
    <div id="content"></div>
    <p class="loading" id="loading">Loading…</p>
</div>
<script>
function getLang() {
    const q = new URLSearchParams(location.search).get('lang');
    const s = localStorage.getItem('5001words_lang');
    const b = (navigator.language||'en').split('-')[0];
    return q || s || b || 'en';
}

const lang = getLang();
document.getElementById('backLink').href = `/5001words/?lang=${lang}`;
if (lang === 'he') document.body.dir = 'rtl';

// Load the pre-generated static privacy policy for the language
const iframe = document.createElement('div');
fetch(`./privacyPolicy/privacy-policy-${lang}.html`)
    .then(r => r.ok ? r.text() : fetch('./privacyPolicy/privacy-policy-en.html').then(r2 => r2.text()))
    .then(html => {
        // Extract body content from the fetched HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const inner = doc.querySelector('.container');
        if (inner) {
            document.querySelector('.container').innerHTML = inner.innerHTML;
        }
    })
    .catch(() => {
        document.getElementById('loading').textContent = 'Could not load privacy policy.';
    });
</script>
</body>
</html>
